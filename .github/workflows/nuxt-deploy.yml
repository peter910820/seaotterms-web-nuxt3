name: Nuxt Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    env:
      VPS_IP: ${{ secrets.VPS_IP }}
      VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
      VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
      VPS_DEPLOY_BASE: ${{ secrets.VPS_DEPLOY_BASE }}
    steps:
      - name: Check Secrets
        run: |
          set -euo pipefail
          missing=0
          for name in VPS_IP VPS_USERNAME VPS_SSH_PASSWORD VPS_DEPLOY_BASE; do
            if [ -z "${!name:-}" ]; then
              echo "::error::缺少必要的 Secret：$name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

  build:
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    env:
      OUTPUT_NAME: ${{ format('{0}-{1}', github.event.repository.name, github.ref_name) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: |
          set -euo pipefail
          # CI 不注入 API 設定；執行時由 VPS 自行提供 .env 與啟動腳本
          npx nuxt build

      - name: Package build output
        run: |
          set -euo pipefail
          mv .output "$OUTPUT_NAME"

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-output
          path: ${{ env.OUTPUT_NAME }}
          if-no-files-found: error
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      VPS_IP: ${{ secrets.VPS_IP }}
      VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
      VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
      VPS_DEPLOY_BASE: ${{ secrets.VPS_DEPLOY_BASE }}
      REPO_NAME: ${{ github.event.repository.name }}
      OUTPUT_NAME: ${{ format('{0}-{1}', github.event.repository.name, github.ref_name) }}
    steps:
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: nuxt-output
          path: dist

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload to VPS
        env:
          SSHPASS: ${{ secrets.VPS_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          if [ ! -d dist ] || [ -z "$(ls -A dist)" ]; then
            echo "::error::找不到編譯產物"
            exit 1
          fi

          deploy_base="${VPS_DEPLOY_BASE%/}"
          target_path="${deploy_base}/${REPO_NAME}"

          ssh_opts="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          remote="${VPS_USERNAME}@${VPS_IP}"

          if [ -d "dist/${OUTPUT_NAME}" ]; then
            source_dir="dist/${OUTPUT_NAME}"
          else
            source_dir="dist"
          fi

          deploy_name="${OUTPUT_NAME}"
          if sshpass -e ssh $ssh_opts "$remote" "[ -d '$target_path/$deploy_name' ]"; then
            deploy_name="${OUTPUT_NAME}-$(date -u +%Y%m%d%H%M%S)"
          fi

          echo "部署 ref：${{ github.ref }} (${{ github.sha }})"
          echo "上傳產物：${source_dir}/ -> ${target_path}/${deploy_name}/"

          sshpass -e ssh $ssh_opts "$remote" "mkdir -p '$target_path/$deploy_name'"
          sshpass -e scp $ssh_opts -r "${source_dir}/." "$remote:$target_path/$deploy_name/"

          echo "已部署 $deploy_name ($REPO_NAME)"
